model:
    vision:
        out_channels: 256
        pretrained: true
        freeze_stem: false
    mamba:
        depth: 4
        state_dim: 16
        conv_kernel: 4
        expand: 2
        dropout: 0.1
    text:
        vocab_size: 8192
        max_length: 32
        dim: 256
        depth: 4
        num_heads: 8
        dropout: 0.1
    fusion:
        dim: 256
        depth: 2
        num_heads: 8
        dropout: 0.1
    head:
        dropout: 0.1
data:
    image_size: 224
train:
    dataset_name: patomp/thai-mscoco-2014-captions
    split: train
    batch_size: 16
    epochs: 5
    lr: 0.0001
    weight_decay: 0.0001
    max_steps_per_epoch: 100
    num_workers: 2
    checkpoint_dir: checkpoints
inference:
    device: cpu
